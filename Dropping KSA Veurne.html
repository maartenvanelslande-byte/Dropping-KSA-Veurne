<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Code invoeren</title>

<style>

body{
    font-family: Arial, sans-serif;
    text-align:center;
    padding:40px;
    background:#f5f5f5;
}

.container{
    max-width:500px;
    margin:auto;
    background:white;
    padding:30px;
    border-radius:10px;
    box-shadow:0 0 10px rgba(0,0,0,.1);
}

input{
    width:100%;
    padding:12px;
    font-size:18px;
    margin-bottom:15px;
    box-sizing:border-box;
}

button{
    padding:12px 25px;
    font-size:18px;
    cursor:pointer;
}

img{
    max-width:100%;
    margin-top:20px;
}

#resultaat{
    margin-top:20px;
}

</style>

</head>

<body>

<div class="container">

<h1>Voer je code in</h1>

<input
    type="text"
    id="code"
    placeholder="Code">

<button onclick="controleerCode()">
    Controleer
</button>

<div id="resultaat"></div>

</div>

<script>

const SCRIPT_URL =
"https://script.google.com/macros/s/AKfycbwGMheg8rWJlzZhPAGpbrQzGlqWiqxfOa7Jo_PsgdYQNWXUe9brQledXAxJcR3EjZ6K6Q/exec";

async function controleerCode() {

    const code =
        document.getElementById("code").value.trim();

    if (!code) return;

    const resultaat =
        document.getElementById("resultaat");

    resultaat.innerHTML = "Bezig met controleren...";

    try {

        const response =
            await fetch(
                `${SCRIPT_URL}?code=${encodeURIComponent(code)}`
            );

        const data =
            await response.json();

        if (data.gevonden) {

            let html =
                `<h2>${data.bericht}</h2>`;

            if (data.afbeelding) {
                html +=
                    `<img src="${data.afbeelding}">`;
            }

            resultaat.innerHTML = html;

        } else {

            resultaat.innerHTML =
                "<p>❌ Ongeldige code</p>";
        }

    } catch(err) {

        resultaat.innerHTML =
            "<p>⚠️ Verbindingsfout</p>";
    }
}

</script>

</body>
</html>
